# version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grsu
      POSTGRES_PASSWORD: grsu_secret
      POSTGRES_DB: grsu_ide
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"

  auth-service:
    build:
      context: .                              # ← корень монорепо
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://grsu:grsu_secret@postgres:5432/grsu_ide_auth
      JWT_ACCESS_SECRET: dev_access_secret_change_in_prod
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod
      SERVICE_KEY: task-service-secret
      NODE_ENV: development
    ports:
      - "4001:4001"
    depends_on:
      - postgres
    develop:
      watch:
        - action: sync+restart
          path: ./services/auth-service/src
          target: /app/src

  fs-service:
    build:
      context: .
      dockerfile: services/fs-service/Dockerfile
    environment:
      PORT: 4002
      DATABASE_URL: postgresql://grsu:grsu_secret@postgres:5432/grsu_ide_fs
      STORAGE_PATH: /storage
      NODE_ENV: development
    ports:
      - "4002:4002"
    volumes:
      - fs_storage:/storage
    depends_on:
      - postgres

  task-service:
    build:
      context: .
      dockerfile: services/task-service/Dockerfile
    environment:
      PORT: 4003
      DATABASE_URL: postgresql://grsu:grsu_secret@postgres:5432/grsu_ide_tasks
      FS_SERVICE_URL: http://fs-service:4002
      RUNNER_SERVICE_URL: http://runner-service:4004
      UTH_SERVICE_URL: http://auth-service:4001
      AUTH_SERVICE_URL: http://auth-service:4001
      SERVICE_KEY: task-service-secret
      NODE_ENV: development
      # Gemini (опционально): без ключа эндпоинты /api/ai вернут 503
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
    ports:
      - "4003:4003"
    depends_on:
      - postgres
      - fs-service

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      PORT: 4000
      JWT_ACCESS_SECRET: dev_access_secret_change_in_prod
      AUTH_SERVICE_URL: http://auth-service:4001
      FS_SERVICE_URL: http://fs-service:4002
      TASK_SERVICE_URL: http://task-service:4003
      RUNNER_SERVICE_URL: http://runner-service:4004
      NODE_ENV: development
    ports:
      - "4000:4000"
    depends_on:
      - auth-service

  runner-service:
    build:
      context: .
      dockerfile: services/runner-service/Dockerfile
    environment:
      PORT: 4004
      REDIS_URL: redis://redis:6379
      FS_SERVICE_URL: http://fs-service:4002
      STORAGE_PATH: /storage
      HOST_STORAGE_PATH: /var/lib/docker/volumes/grsu-ide-backend_fs_storage/_data
      CODE_TIMEOUT_MS: 15000
      MAX_CONCURRENT_RUNS: 5
      NODE_ENV: development
    ports:
      - "4004:4004"
    volumes:
      - fs_storage:/storage
      - /var/run/docker.sock:/var/run/docker.sock  # даём доступ к Docker хоста
    depends_on:
      - redis
      - fs-service

volumes:
  postgres_data:
  fs_storage: